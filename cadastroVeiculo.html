<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveX - Cadastro de Veículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/main.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🚗 DriveX</a>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-cliente.html">Cadastrar Cliente</a></li>
                    <li class="nav-item"><a class="nav-link" href="listagem-clientes.html">Lista de Clientes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cadastro-veiculo.html">Cadastrar Veículo</a></li>
                    <li class="nav-item"><a class="nav-link" href="listagem-veiculos.html">Lista de Veículos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-4" style="max-width: 720px;">
        <div class="py-4 text-center">
            <h2>Cadastro de Novo Veículo</h2>
            <p class="lead">Adicione novos automóveis à frota disponível para locação.</p>
        </div>

        <div class="card shadow-sm p-4">
            <form class="needs-validation" novalidate action="listagem-veiculos.html">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="marca" class="form-label">Marca</label>
                        <input type="text" class="form-control" id="marca" placeholder="Ex: Chevrolet" required>
                    </div>

                    <div class="col-md-6">
                        <label for="modelo" class="form-label">Modelo</label>
                        <input type="text" class="form-control" id="modelo" placeholder="Ex: Onix Plus" required>
                    </div>

                    <div class="col-md-4">
                        <label for="ano" class="form-label">Ano</label>
                        <input type="number" class="form-control" id="ano" placeholder="2024" required>
                    </div>

                    <div class="col-md-4">
                        <label for="placa" class="form-label">Placa</label>
                        <input type="text" class="form-control" id="placa" placeholder="ABC1D23" required>
                    </div>

                    <div class="col-md-4">
                        <label for="diaria" class="form-label">Valor da Diária (R$)</label>
                        <input type="number" step="0.01" class="form-control" id="diaria" placeholder="149.90" required>
                    </div>
                </div>

                <hr class="my-4">
                <button class="w-100 btn btn-success btn-lg" type="submit">Inserir Veículo na Frota</button>
            </form>
        </div>
    </div>

    <footer class="container text-center mt-5 border-top pt-4">
        <p>&copy; 2026 DriveX &middot; <a href="#">Privacidade</a></p>
    </footer>
</body>
</html>
